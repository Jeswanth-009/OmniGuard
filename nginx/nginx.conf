# OmniGuard Nginx Configuration
# Load Balancer with Round-Robin for FastAPI Replicas

# Upstream cluster definition for FastAPI replicas
upstream omniguard_cluster {
    # Round-robin load balancing (default)
    # Least connections alternative: least_conn;
    
    # FastAPI replicas (Docker Compose scale=3)
    server omniguard-api:8000 weight=1 max_fails=3 fail_timeout=30s;
    
    # Keep connections alive for performance
    keepalive 32;
    keepalive_requests 1000;
    keepalive_timeout 60s;
}

# Rate limiting zone
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=100r/s;
limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

# Caching configuration
proxy_cache_path /var/cache/nginx levels=1:2 keys_zone=api_cache:10m max_size=100m inactive=5m;

server {
    listen 80;
    server_name localhost omniguard;
    
    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header X-Gateway "OmniGuard-Nginx" always;
    
    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types text/plain text/css text/xml text/javascript application/json application/javascript application/xml+rss;
    gzip_comp_level 6;
    
    # Client body size limit
    client_max_body_size 10m;
    client_body_buffer_size 128k;
    
    # Timeouts - tight for handling spikes
    proxy_connect_timeout 5s;
    proxy_send_timeout 30s;
    proxy_read_timeout 30s;
    send_timeout 30s;
    
    # Connection limits
    limit_conn conn_limit 100;
    
    # Buffer settings
    proxy_buffering on;
    proxy_buffer_size 4k;
    proxy_buffers 8 16k;
    proxy_busy_buffers_size 24k;
    
    # Health check endpoint - no rate limiting
    location /health {
        proxy_pass http://omniguard_cluster;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        
        # No caching for health checks
        proxy_cache off;
        add_header X-Cache-Status "BYPASS" always;
    }
    
    # Metrics endpoint - allow Prometheus scraping
    location /metrics {
        proxy_pass http://omniguard_cluster;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Connection "";
        
        # No caching for metrics
        proxy_cache off;
    }
    
    # API endpoints with rate limiting
    location /api/ {
        # Rate limiting
        limit_req zone=api_limit burst=50 nodelay;
        limit_req_status 429;
        
        proxy_pass http://omniguard_cluster;
        proxy_http_version 1.1;
        
        # Headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_id;
        proxy_set_header Connection "";
        
        # Caching for GET requests (optional - Redis is primary cache)
        # proxy_cache api_cache;
        # proxy_cache_methods GET;
        # proxy_cache_valid 200 1m;
        # proxy_cache_key $scheme$request_method$host$request_uri;
        # add_header X-Nginx-Cache $upstream_cache_status;
    }
    
    # Documentation endpoints
    location ~ ^/(docs|redoc|openapi.json) {
        proxy_pass http://omniguard_cluster;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Connection "";
        
        # Cache documentation
        proxy_cache api_cache;
        proxy_cache_valid 200 10m;
    }
    
    # Landing page and static assets
    location / {
        proxy_pass http://omniguard_cluster;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Connection "";
        
        # Enable WebSocket support if needed
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
    
    # Custom error pages
    error_page 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
        internal;
    }
    
    # Nginx status for monitoring (internal only)
    location /nginx_status {
        stub_status on;
        allow 127.0.0.1;
        allow 172.16.0.0/12;  # Docker network
        deny all;
    }
}

# Health check server for Nginx itself
server {
    listen 8080;
    server_name localhost;
    
    location /nginx-health {
        access_log off;
        default_type text/plain;
        return 200 "healthy\n";
    }
    
    location /nginx_status {
        stub_status on;
        access_log off;
        allow 127.0.0.1;
        allow 172.16.0.0/12;
        deny all;
    }
}
