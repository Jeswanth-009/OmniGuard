# OmniGuard Alertmanager Configuration Template
# Render this file with scripts/render-alertmanager-config.ps1

global:
  smtp_smarthost: 'smtp.example.com:587'
  smtp_from: 'alertmanager@omniguard.io'
  smtp_auth_username: 'alertmanager@omniguard.io'
  smtp_auth_password: ''
  slack_api_url: '__SLACK_WEBHOOK_URL__'
  resolve_timeout: 5m

templates:
  - '/etc/alertmanager/templates/*.tmpl'

route:
  receiver: 'default-webhook'
  group_by: ['alertname', 'severity', 'service']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  routes:
    - match:
        severity: critical
      receiver: 'critical-webhook'
      group_wait: 10s
      repeat_interval: 1h
      continue: true

    - match:
        alertname: HighErrorRate
      receiver: 'critical-webhook'
      group_wait: 30s
      repeat_interval: 30m

    - match:
        alertname: High5xxErrorRate
      receiver: 'critical-webhook'
      group_wait: 1m
      repeat_interval: 30m

    - match_re:
        alertname: 'Cache.*'
      receiver: 'default-webhook'
      group_wait: 5m
      repeat_interval: 2h

    - match:
        group: infrastructure
      receiver: 'critical-webhook'
      group_wait: 2m
      repeat_interval: 1h

receivers:
  - name: 'default-webhook'
    webhook_configs:
      - url: '__ALERT_WEBHOOK_URL__'
        send_resolved: true
        max_alerts: 10

  - name: 'critical-webhook'
    webhook_configs:
      - url: '__CRITICAL_ALERT_WEBHOOK_URL__'
        send_resolved: true
        max_alerts: 5

  - name: 'slack-notifications'
    slack_configs:
      - channel: '#omniguard-alerts'
        send_resolved: true
        username: 'OmniGuard AlertBot'
        icon_emoji: ':shield:'
        title: '{{ .Status | toUpper }}{{ if eq .Status "firing" }} 🔥{{ else }} ✅{{ end }} {{ .CommonAnnotations.summary }}'
        text: >-
          {{ range .Alerts }}
          *Alert:* {{ .Annotations.summary }}
          *Description:* {{ .Annotations.description }}
          *Severity:* {{ .Labels.severity }}
          *Service:* {{ .Labels.service }}
          {{ end }}
        actions:
          - type: button
            text: 'View in Grafana'
            url: 'http://localhost:3000/d/omniguard'
          - type: button
            text: 'Silence'
            url: '{{ template "__alertmanagerURL" . }}/#/silences/new?filter=%7Balertname%3D%22{{ .CommonLabels.alertname }}%22%7D'

  - name: 'email-notifications'
    email_configs:
      - to: 'oncall@omniguard.io'
        send_resolved: true
        headers:
          Subject: '[OmniGuard {{ .Status | toUpper }}] {{ .CommonAnnotations.summary }}'

  - name: 'pagerduty'
    pagerduty_configs:
      - service_key: '__PAGERDUTY_SERVICE_KEY__'
        severity: '{{ .CommonLabels.severity }}'
        description: '{{ .CommonAnnotations.summary }}'
        details:
          firing: '{{ template "pagerduty.default.instances" .Alerts.Firing }}'
          resolved: '{{ template "pagerduty.default.instances" .Alerts.Resolved }}'
          num_firing: '{{ .Alerts.Firing | len }}'
          num_resolved: '{{ .Alerts.Resolved | len }}'

inhibit_rules:
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['alertname', 'service']

  - source_match:
      alertname: 'ServiceDown'
    target_match_re:
      alertname: '.*'
    equal: ['service']
