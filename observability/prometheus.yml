# OmniGuard Prometheus Configuration
# Scrape configuration for all services

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'omniguard-monitor'
    environment: 'production'

# Alertmanager configuration
alerting:
  alertmanagers:
    - static_configs:
        - targets:
          - alertmanager:9093

# Rule files
rule_files:
  - /etc/prometheus/rules/*.yml

# Scrape configurations
scrape_configs:
  # ==========================================================================
  # PROMETHEUS SELF-MONITORING
  # ==========================================================================
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
    metrics_path: /metrics
    scheme: http

  # ==========================================================================
  # OMNIGUARD API INSTANCES
  # ==========================================================================
  - job_name: 'omniguard-api'
    dns_sd_configs:
      - names:
          - 'tasks.omniguard-api'
        type: 'A'
        port: 8000
        refresh_interval: 10s
    
    # Fallback static config for single-host deployment
    static_configs:
      - targets: 
          - 'omniguard-api:8000'
        labels:
          group: 'api'
          service: 'omniguard'
    
    metrics_path: /metrics
    scheme: http
    scrape_interval: 10s
    scrape_timeout: 5s
    
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        regex: '(.+):8000'
        replacement: '${1}'

  # ==========================================================================
  # NGINX LOAD BALANCER
  # ==========================================================================
  - job_name: 'nginx'
    static_configs:
      - targets: ['nginx:8080']
        labels:
          group: 'infrastructure'
          service: 'nginx'
    metrics_path: /nginx_status
    scheme: http
    scrape_interval: 10s

  # ==========================================================================
  # REDIS CACHE
  # ==========================================================================
  - job_name: 'redis'
    static_configs:
      - targets: ['redis-exporter:9121']
        labels:
          group: 'cache'
          service: 'redis'
    metrics_path: /metrics
    scheme: http
    scrape_interval: 15s

  # ==========================================================================
  # ALERTMANAGER
  # ==========================================================================
  - job_name: 'alertmanager'
    static_configs:
      - targets: ['alertmanager:9093']
        labels:
          group: 'monitoring'
          service: 'alertmanager'
    metrics_path: /metrics
    scheme: http
